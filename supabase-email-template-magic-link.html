<table width="100%" cellpadding="0" cellspacing="0" bgcolor="#f1f5f9" style="background-color:#f1f5f9;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;">
  <tr>
    <td align="center" style="padding:48px 16px;">
      <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;width:100%;">

        <!-- ヘッダー -->
        <tr>
          <td bgcolor="#0f172a" style="background-color:#0f172a;border-radius:16px 16px 0 0;padding:24px 32px;" align="center">
            <span style="font-size:20px;font-weight:900;letter-spacing:0.06em;color:#ffffff;">SENPAI <span style="color:#22d3ee;">RINK</span></span>
          </td>
        </tr>

        <!-- 本文 -->
        <tr>
          <td bgcolor="#ffffff" style="background-color:#ffffff;padding:36px 32px 28px;">
            <p style="margin:0 0 6px;font-size:11px;font-weight:700;letter-spacing:0.22em;color:#22d3ee;text-transform:uppercase;">Login Link</p>
            <h1 style="margin:0 0 16px;font-size:22px;font-weight:900;color:#0f172a;line-height:1.3;">ログインリンクをお送りしました</h1>
            <p style="margin:0 0 28px;font-size:14px;line-height:1.85;color:#475569;">
              以下のボタンからマイページへ進めます。<br />
              リンクは<strong style="color:#0f172a;">10分間</strong>有効です。<br />
              期限切れの場合は再度メールアドレスを送信してください。
            </p>

            <!-- ボタン -->
            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center" style="padding-bottom:28px;">
                  <a href="{{ .ConfirmationURL }}"
                     style="display:inline-block;background-color:#0f172a;color:#ffffff;font-size:15px;font-weight:900;text-decoration:none;padding:15px 44px;border-radius:100px;letter-spacing:0.04em;">
                    ログインする &rarr;
                  </a>
                </td>
              </tr>
            </table>

            <p style="margin:0;font-size:11px;color:#94a3b8;line-height:1.7;">
              ボタンが機能しない場合はこのURLをブラウザに貼り付けてください：<br />
              <a href="{{ .ConfirmationURL }}" style="color:#0ea5e9;word-break:break-all;font-size:11px;">{{ .ConfirmationURL }}</a>
            </p>
          </td>
        </tr>

        <!-- フッター -->
        <tr>
          <td bgcolor="#f8fafc" style="background-color:#f8fafc;border-radius:0 0 16px 16px;padding:20px 32px;border-top:1px solid #e2e8f0;" align="center">
            <p style="margin:0;font-size:12px;color:#94a3b8;line-height:1.7;">
              このメールに心当たりがない場合は無視してください。<br />
              アカウントへの不正アクセスは発生していません。
            </p>
            <p style="margin:12px 0 0;font-size:11px;color:#cbd5e1;">&copy; SENPAI RINK</p>
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
